name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: COGifPlugin.xcodeproj
  SCHEME: COGifPlugin
  CONFIGURATION: Release
  PRODUCT: COGifPlugin.coplugin

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            artifact_suffix: macos-arm64
          - arch: x86_64
            runner: macos-15-intel
            artifact_suffix: macos-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          set -euo pipefail
          uname -a
          uname -m
          xcodebuild -version
          swift --version

      - name: Build plugin
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/COGifPluginDerivedData"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -derivedDataPath "$DERIVED_DATA" \
            ARCHS="${{ matrix.arch }}" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Verify plugin
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/COGifPluginDerivedData"
          PRODUCT_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/$PRODUCT"
          test -d "$PRODUCT_PATH"
          codesign --verify --deep --strict --verbose=2 "$PRODUCT_PATH"
          file "$PRODUCT_PATH/Contents/MacOS/$SCHEME"
          lipo -info "$PRODUCT_PATH/Contents/MacOS/$SCHEME"

      - name: Package plugin
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/COGifPluginDerivedData"
          PRODUCT_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/$PRODUCT"
          mkdir -p dist
          ditto -c -k --keepParent "$PRODUCT_PATH" "dist/COGifPlugin-${{ matrix.artifact_suffix }}.zip"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: COGifPlugin-${{ matrix.artifact_suffix }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: COGifPlugin-*
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.zip --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" dist/*.zip --title "$GITHUB_REF_NAME" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
