name: CI
run-name: CI ${{ github.ref_name }}

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  build:
    name: Build
    needs: test
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
